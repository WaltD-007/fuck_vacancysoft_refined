live_source:
  enabled: false  # Disabled — taxonomy now managed in this YAML. Update Google Sheet to match before re-enabling.
  spreadsheet_id: "1V9EDsDQpqaa9-5zMOe6-_Yzm2ffVplMUIn26jpHAOMw"
  sheet_name: "Taxonomy"
  timeout_seconds: 10

categories:
  risk: Risk
  quant: Quant
  compliance: Compliance
  audit: Audit
  cyber: Cyber
  legal: Legal
  front_office: Front Office

category_defaults:
  Risk: Risk Management
  Quant: Quantitative (General)
  Compliance: Regulatory Compliance
  Audit: Audit (General)
  Cyber: Cyber Security
  Legal: Legal (General)
  Front Office: Trading (General)
  Other: Other

sub_specialism_keywords:
  Risk:
    # Order matters: more specific sub-specialisms first, Risk Management last (catch-all).
    # `chief risk` and `cro ` are intentionally NOT routed here — they are "all sub specialisms"
    # signals. They still classify as Risk via _TAXONOMY_RULES, but let a more specific keyword
    # in the title pick the sub-specialism; otherwise fall through to Risk Management default.
    Credit Risk: [counterparty credit, counterparty risk, credit quality assurance, credit risk, credit quality, retail credit risk, risk appetite, wholesale credit, asset liability, credit analyst, credit assessment, credit officer, credit portfolio, credit strategy, credit portolio management]
    Market Risk: [market risk assurance, market risk, value at risk, investment risk, trading risk, cva, xva]
    # Quant Risk owns ALL quant-flavoured risk roles. Keywords from the
    # former Quant → Risk Quant sub-spec (risk quant, quantitative risk,
    # risk analytics quant) plus model-validation/risk variants are
    # consolidated here so substring matches land in one place.
    Quant Risk: [model risk, model risk quant, model review, model validation, model validation quant, quantitative model risk, quantitative validation, quantitative risk, risk quant, risk analytics quant, risk analytics, reverse stress, scenario analysis, stress testing, stress test, validation analyst, validation engineer]
    # Operational Risk before Prudential Risk so "non financial risk" wins over
    # Prudential's "financial risk" keyword on substring match.
    Operational Risk: [enterprise risk, head of risk, non financial risk, op risk, operational risk, ops risk, risk controls, risk framework, risk governance, risk reporting]
    Prudential Risk: [liquidity risk, capital planning risk, financial risk, icaap, ilaap, prudential risk, reserving risk, treasury risk, treasury analyst, treasury manager, liquidity management, prudential, alm, treasury]
    Risk Management: [insurance risk, risk management, risk advisory, risk assessment, risk associate, risk assurance, risk consultant, risk]
  Quant:
    Quantitative Research: [quantitative research, quant research, quant researcher, quantitative researcher]
    Quantitative Development: [quantitative developer, quantitative development, quant developer, quant dev, c++ quant, python quant]
    Quantitative Trading: [quantitative trading, quant trader, quant trading]
    Quantitative Strategist: [strat, strats, quant strat, quantitative strategist, quantitative strategy]
    Quantitative Analytics: [quantitative analyst, quant analyst, quantitative analytics, quant analytics]
    Quantitative Modelling: [quantitative modeller, quantitative modeler, quantitative model, quant modeller, quant modeler, quantitative modelling, quantitative modeling]
    Algorithmic Trading: [algorithmic trader, algorithmic trading, algo trader, algo trading, algo developer, algo engineer, low latency algo]
    Systematic Trading: [systematic trader, systematic trading]
    Electronic Trading Dev: [electronic trading developer, etrading developer, low latency developer]
    # Risk Quant sub-spec removed — quant-flavoured risk roles (risk quant,
    # quantitative risk, risk analytics quant, model risk quant, model
    # validation quant, etc.) now consolidate under Risk → Quant Risk.
    # Top-level routing in classifiers/taxonomy.py also pushes those
    # phrases to Risk so the YAML mapper sees them under the right category.
    Machine Learning: [machine learning quant, ml quant, quant ml, trading ml engineer, financial ml engineer, alpha ml, ml researcher trading]
    AI Engineer: [ai quant, quant ai engineer, trading ai engineer, financial ai engineer, ai engineer trading, ai engineer quant, ai architect trading, ai architect quant, ai engineer hedge fund, ai engineer investment]
    Data Engineering (Quant): [quant data engineer, quant data, trading data engineer]
    Signal Research: [signal research, alpha research, alpha generation, factor research]
    Portfolio Construction: [portfolio construction, portfolio optimisation, portfolio optimization]
    Execution Research: [execution research, tca, transaction cost analysis]
    Data Science: [quant data scientist, quantitative data scientist, trading data scientist, financial data scientist, data science quant, data scientist quant, alpha data scientist]
    Pricing: [pricing quant, derivatives pricing, exotic pricing, pricing model, pricing analyst quant]
    Structuring: [structuring, structurer, exotic structuring]
    Derivatives: [derivatives, derivatives quant, derivatives modelling, derivatives modeling, derivatives structuring, derivatives analyst, derivatives sales]
    Quantitative (General): [quant, quantitative]
  Compliance:
    Financial Crime: [financial crime, aml, kyc, sanctions, transaction monitoring, fraud risk, mlro, money laundering]
    Governance: [governance]
    Regulatory Compliance: [compliance, regulatory compliance, surveillance]
  Audit:
    # External Audit intentionally omitted — we do not recruit that market;
    # those titles are hard-blocked via _TITLE_BLOCKLIST in classifiers/taxonomy.py.
    Internal Audit: [internal audit]
    IT Audit: [it audit, technology audit]
    Audit (General): [audit]
  Cyber:
    Security Engineering: [security engineering]
    Security Architecture: [security architecture]
    Threat Detection: [threat detection]
    Offensive Security: [offensive security, red team, penetration testing]
    Cyber GRC: [cyber grc, grc]
    Resilience: [resilience, operational resilience, business continuity, disaster recovery, crisis management]
    Cyber Security: [cyber, cyber security, information security]
  Legal:
    Contracts: [contracts, contract]
    Legal Counsel: [legal counsel, counsel]
    Solicitor: [solicitor]
    Paralegal: [paralegal]
    Legal (General): [legal]
  Front Office:
    Fixed Income Trading: [fixed income trading]
    Equities Trading: [equities trading, equity trading]
    FX Trading: [fx trading, foreign exchange trading]
    Commodities Trading: [commodities trading]
    Credit Trading: [credit trading]
    Rates Trading: [rates trading]
    Market Making: [market making]
    Electronic Trading: [electronic trading]
    Sales Trading: [sales trading]
    Portfolio Management: [portfolio manager, portfolio management]
    Trading (General): [trader, trading]
  Other:
    Underwriting: [underwriter, underwriting, chief underwriting officer]


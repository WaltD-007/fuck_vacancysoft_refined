[app]
name = "prospero"
environment = "dev"
database_url = "postgresql://localhost/prospero"
log_level = "INFO"

[discovery]
default_concurrency = 8
allow_browser_fallback = true
raw_payload_dir = "./artifacts/raw"

[enrichment]
detail_fetch_concurrency = 4
max_retries = 3

[exports]
default_profile = "accepted_only_excel"

[worker]
redis_url = "redis://localhost:6379"
max_concurrent = 25
# Single process_lead job has to fit: (optional description scrape 0-60s) +
# dossier main call + dossier HM search + campaign pre-generation. On
# DeepSeek that's ~300-360s end-to-end; on OpenAI with gpt-5-mini +
# web_search at "high" context it can reach 400-500s. 300s was killing
# the campaign step of every DeepSeek run mid-flight (dossier committed
# before campaign starts, so the symptom was dossiers landing with no
# matching campaign row). 900s = comfortable margin for both providers.
job_timeout = 900
max_retries = 3

[intelligence]
# Model routing (2026-04-20 quality upgrade):
#   - dossier main:       gpt-5.2 + low reasoning  (heavier model; reasoning
#                                                   effort dropped from medium
#                                                   to low since gpt-5.2's base
#                                                   quality already exceeds
#                                                   mini+medium on analytical
#                                                   sections — avoids paying
#                                                   for quality twice)
#   - hiring manager:     gpt-5.2 + medium         (small payload, accuracy on
#                                                   real-name lookup matters)
#   - campaign:           gpt-5.4 + low            (writing quality is now the
#                                                   ceiling for outreach copy;
#                                                   low reasoning keeps latency
#                                                   sane and JSON output stable)
#
# Cost envelope (observed/estimated, per lead):
#   dossier   ~$0.060-0.080   (38k prompt / 2k completion on gpt-5.2 @ low)
#   campaign  ~$0.025-0.030   (2.5k prompt / 1.5k completion on gpt-5.4)
#   HM        ~$0.046         (unchanged — SerpApi + gpt-4o-mini extraction)
#   total     ~$0.135/lead    (vs ~$0.08 on previous mini/5.2 config).
#
# Rollback: revert this commit or flip back to:
#   dossier_model = "gpt-5-mini", dossier_reasoning_effort = "medium"
#   campaign_model = "gpt-5.2", timeout_seconds = 300
# Config is re-read per call by _load_intel_config(); no code deploy needed.
dossier_model = "gpt-5.2"
# Campaign quality upgrade 2026-04-19: promoted gpt-5-mini → gpt-5.2
# for the campaign primary. Rationale: the dossier body is already
# rich (full stated_vs_actual + spec_risk explanations + candidate
# outcomes + lead justification + HM name/title are now in the prompt),
# so the campaign call is context-rich and the quality ceiling is
# now the writing model, not the information it has. gpt-5.2 is 5×
# the unit rate of gpt-5-mini but campaign tokens are small (~2.5k
# prompt + ~1.5k completion with the new shape) so per-lead delta is
# ~$0.010/campaign. Fits well inside the operator's $0.10/lead ceiling.
#
# Campaign quality upgrade 2026-04-20: promoted gpt-5.2 → gpt-5.4.
# 2026-04-27: bumped campaign_model to gpt-5.5 alongside the V3
# template flip below. OpenAI's GPT-5.5 prompt-guidance:
# • literal-and-thorough instruction interpretation, so V3's persona-
#   led positive framing produces more natural prose than V2's
#   negative-rule-heavy stack.
# • reasoning_effort=low remains the right default for non-reasoning
#   creative tasks; kept unchanged.
# Rollback: set campaign_model back to "gpt-5.4" + campaign_template_version
# to "v2" and restart.
campaign_model = "gpt-5.5"
campaign_reasoning_effort = "low"
# Fallback used if the primary campaign model returns empty content
# (reasoning models occasionally burn the entire max_completion_tokens
# budget on internal reasoning and produce no visible JSON). gpt-4o
# has no reasoning step so it can't hit the same trap.
campaign_fallback_model = "gpt-4o"

# ── Campaign prompt template version ──
# "v3" (default, 2026-04-27+, GPT-5.5): persona-led aggressive rule-
#   cut on V2. Drops closed-list CTAs, banned-phrase lists, the pre-
#   return checklist, the rigid tone→source mapping, and the campaign-
#   anchor framework. Strong persona block driven by
#   {recruiter_specialism} from CATEGORY_BLOCKS. Closer to natural
#   recruiter prose.
# "v2" (legacy, 2026-04-20+): "tone controls content" shape. Each of
#   the six tones has a FIXED home dossier section and one concrete
#   anchor that persists across all five sequences. Six distinct
#   five-email arcs.
# "v1" (legacy, frozen): "same message, different voice" shape. All
#   six tones within a sequence convey the same core message, re-
#   voiced. Uses the {outreach_angle} slot from category_blocks.py.
# Hot-swap rollback: flip this and restart the API + worker. No code
# redeploy needed; templates coexist in base_campaign.py.
campaign_template_version = "v3"

temperature = 0.4
max_tokens = 16000
# Bumped from 120 to 300 (2026-04): gpt-5-mini with web_search at high
# context size can take 130-180s for a dossier.
# Bumped from 300 to 450 (2026-04-20): gpt-5.2 at reasoning="low" with
# web_search="high" is typically 150-220s but heavy leads (long JDs,
# deep company history) can touch 280s. 450s gives comfortable margin
# while still fitting inside the worker's 900s job_timeout.
timeout_seconds = 450

# Cost-control levers for the dossier pipeline:
# - dossier_reasoning_effort: "low" | "medium" | "high". Lower values
#   cut output (reasoning) tokens — the dominant cost — at some quality
#   cost. Default "medium".
# - hm_search_model: which model handles the hiring-manager search call
#   (call 2 of the dossier). Originally a cheap non-reasoning model, but
#   accuracy on real-person lookup pushed it back up to gpt-5.4.
# - hm_search_reasoning_effort: only applied if hm_search_model is a
#   reasoning model — otherwise silently ignored.
#
# Dropped from "medium" → "low" (2026-04-20) alongside the dossier
# model swap to gpt-5.2. gpt-5.2's base output quality at "low" effort
# already exceeds gpt-5-mini at "medium", so paying for medium-effort
# reasoning on top double-counts the quality boost and burns ~60% more
# completion tokens (reasoning dominates dossier completion cost).
# Flip back to "medium" if the Campaign Builder starts producing
# noticeably shallower copy or lead_score reasoning feels thin.
dossier_reasoning_effort = "low"
# Web-search context size for the main dossier call. "high" allows
# ~100K input tokens of web context (vs ~25K at "low"). Paired with
# the doubled word caps in base_dossier.py to give each section room
# to be richer.
#
# Dropped "high" → "medium" (2026-04-21) after observed per-lead cost
# on the gpt-5.2 dossier config (PROMPT_VERSION v1.2) averaged ~$0.118
# — above the operator's $0.15/lead envelope once combined with
# gpt-5.4 campaign + HM. Medium context shaves ~$0.017/lead on input
# tokens (~14k fewer prompt tokens × $1.25/1M) while keeping the
# analytical sections grounded. Flip back to "high" if company_context
# section quality noticeably degrades on less well-known firms.
dossier_search_context_size = "medium"
hm_search_model = "gpt-5.2"
hm_search_reasoning_effort = "medium"
# HM call deliberately stays at "high" — the whole point of the HM
# upgrade is accuracy on real-person identification, which benefits
# from broad web context. Small payload so cost stays bounded.
hm_search_context_size = "high"

# ── Alternative HM path: SerpApi + cheap-model extraction ──
# When true, the HM call runs via SerpApi (LinkedIn site: searches hit
# Google directly) + a small extraction model (default gpt-4o-mini),
# instead of OpenAI Responses-API web_search_preview. Cuts per-dossier
# HM cost ~60% ($0.064 → ~$0.025) and latency ~3-4× at similar quality
# on named-individual extraction.
#
# If SERPAPI_KEY is missing or SerpApi raises, dossier.py falls back
# to the OpenAI web_search route automatically — no dossier is lost.
#
# hm_serpapi_max_searches: how many of the category's pre-authored
#   LinkedIn queries to run per lead. 5 covers head-of / director /
#   chief variants comfortably. Cost scales linearly (~$0.015/search).
# hm_extraction_model: the model that reads SerpApi snippets and
#   extracts names. gpt-4o-mini is cheap, fast, and non-reasoning —
#   avoids the max_tokens-burn-on-hidden-CoT trap.
use_serpapi_hm_search = true
# Default 3 searches lands cost around $0.046/lead vs $0.064 baseline
# (~28% saving) at $0.015/search pricing. Going to 5 searches
# (recall-first mode) pushes cost to ~$0.076 — slightly above the
# OpenAI baseline but with 5x lower latency and higher recall on
# obscure titles. Pick per your cost/quality trade-off.
hm_serpapi_max_searches = 3
hm_extraction_model = "gpt-4o-mini"

# ── HM search template version ──
# "v2" (default, 2026-04-20+): a single generic template per category
#   using [function] (filled at runtime from ClassificationResult
#   .sub_specialism) + optional [location]. Seven universally-applicable
#   title patterns: head of / global head of / regional head of /
#   director of / <function> director / managing director <function> /
#   chief <function> officer.
# "v1" (legacy): the original seven per-category hand-written search
#   blocks from category_blocks.py (_LEGACY_*_HM_SEARCHES). Kept as a
#   hot-swap rollback target. Flip this to "v1" and restart the API +
#   worker to revert without a code deploy.
hm_template_version = "v2"

# ── Provider selection ──
# Flip these to route dossier / campaign calls to DeepSeek instead of
# OpenAI. Hiring-manager search is hard-wired to OpenAI in dossier.py
# (handles named real people; moving it is a policy decision, not a
# config flip). Full discussion: docs/intelligence-providers.md.
#
# Caveats when a toggle is set to true:
#  - web_search is silently dropped (DeepSeek has no web-search tool).
#    For dossier specifically, this means the main call answers from
#    training data only — less depth on company background.
#  - reasoning_effort is silently ignored (DeepSeek uses a fixed
#    internal reasoning budget).
#
# Both toggles default to false so current behaviour is unchanged
# until you explicitly opt in.
use_deepseek_for_dossier = false
use_deepseek_for_campaign = false

# Models used when the corresponding toggle is true.
# deepseek-reasoner == R1 (highest-performance reasoning model).
# deepseek-chat     == V3 (non-reasoning; faster, cheaper, better
#                          tuned for creative writing).
#
dossier_model_deepseek = "deepseek-reasoner"
campaign_model_deepseek = "deepseek-reasoner"
campaign_fallback_model_deepseek = "deepseek-chat"

# ── Advert-text extraction ──
# The Lead List's text-paste flow uses this model to pull {title,
# company, location, posted_date} out of a pasted advert body. JSON
# mode, temperature 0, four-key output — a small, cheap workload where
# gpt-4o-mini is the right default (sub-second, <$0.001/call).
#
# Flip use_deepseek_for_advert_extract to route to DeepSeek's chat
# model instead — useful if you want to avoid an OpenAI dependency for
# this hot path specifically.
advert_extract_model = "gpt-4o-mini"
use_deepseek_for_advert_extract = false
advert_extract_model_deepseek = "deepseek-chat"

# ─── Outreach email (Microsoft Graph) ──────────────────────────────
# See docs/outreach_email.md for the full design + launch checklist.
#
# Master kill-switch lives at the env var OUTREACH_DRY_RUN (default
# true). That takes precedence over anything here. The knobs below
# control scheduling + cadence once live.
[outreach]

# Minutes between reply polls per conversation. Each send enqueues
# its first poll at +10 minutes, then the poller re-enqueues itself
# at this interval until either (a) a reply lands, or (b) we hit
# poll_max_days since the first send in that conversation.
poll_interval_minutes = 10

# After this many days since the earliest send in a conversation,
# stop polling for replies. Past this window the remaining sequence
# (if any) has already completed and we're just spending Graph calls
# on long-dead threads. 90 days covers the full 5-sequence x 28d
# cadence plus a generous late-reply buffer.
poll_max_days = 90

# Default day-offsets for the 5-sequence schedule. First value must
# be 0 (send immediately); remaining values are days after the first
# send. UI overrides per-campaign when PR D lands.
default_cadence_days = [0, 7, 14, 21, 28]

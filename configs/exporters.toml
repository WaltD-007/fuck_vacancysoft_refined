[profiles.accepted_only]
view = "accepted_only"
include_export_decisions = ["accepted"]
json_payload_mode = "legacy_body_array"
excel_sheet_name = "Accepted Jobs"

[profiles.accepted_plus_review]
view = "accepted_plus_review"
include_export_decisions = ["accepted", "review"]
json_payload_mode = "legacy_body_array"
excel_sheet_name = "Accepted And Review"

[client_segments.risk_only]
taxonomy_keys = ["risk"]
include_export_decisions = ["accepted", "review"]

[client_segments.control_functions]
taxonomy_keys = ["risk", "compliance", "audit", "legal"]
include_export_decisions = ["accepted"]

[client_segments.front_office]
taxonomy_keys = ["front_office", "quant"]
include_export_decisions = ["accepted", "review"]

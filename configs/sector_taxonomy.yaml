# Sector taxonomy for the `sources.sector` column.
#
# This file is the operator-curated source of truth for industry/sector
# classification. The `detect_sector()` function in
# `src/vacancysoft/source_registry/sector_classifier.py` reads this file
# and returns the matching sector for any (employer_name, adapter, base_url).
#
# Editing rules:
#   - Edit the `employers:` map to set/change classifications. Keys are
#     `canonical_company_key` (slugified employer_name — lowercase,
#     non-alphanumerics → underscore).
#   - Add new sectors to `allowed_sectors:` only if a genuine bucket is
#     missing — keep granularity broad (~30 buckets).
#   - `patterns:` is a fallback regex list. Order matters; first match
#     wins. Used only when the employer is not in `employers:`.
#   - `deny_pattern_match:` is the kill-list — these
#     canonical_company_keys never get auto-classified by patterns,
#     even if they match. Use sparingly to defend against false
#     positives (e.g. Capital One should never be auto-tagged via
#     a `\bcapital\b` pattern).
#
# After editing, run:
#   python3 scripts/backfill_sectors.py --commit
# to re-classify all existing rows. Idempotent and safe.

# ─── Allowed sectors (~30) ──────────────────────────────────────────────
# These are the only valid `sector` values. detect_sector() always
# returns one of these. New sectors require code review.
allowed_sectors:
  - retail_bank
  - investment_bank
  - building_society
  - hedge_fund
  - asset_manager
  - private_equity
  - private_credit
  - wealth_manager
  - insurance
  - reinsurance
  - insurance_broker
  - pension_fund
  - sovereign
  - fintech
  - payments
  - crypto
  - hft_market_maker
  - commodity_trading
  - regtech
  - insurtech
  - wealthtech
  - lending
  - consultancy
  - law_firm
  - audit_firm
  - regulator
  - custodian
  - market_infrastructure
  - data_provider
  - aggregator
  - recruitment
  - unknown


# ─── Pattern fallback ───────────────────────────────────────────────────
# Used ONLY when the canonical_company_key is not in `employers`.
# Order matters — first match wins. Case-insensitive regex against the
# raw `employer_name` (NOT the slugified key), to allow space-aware
# matches like "\bBuilding Society\b".
patterns:
  - regex: 'building society'
    sector: building_society
  - regex: '\binsurance\b|\binsurer\b|\bunderwriter\b|\bunderwriting\b'
    sector: insurance
  - regex: '\breinsurance\b|\breinsurer\b'
    sector: reinsurance
  - regex: '\bbroker\b|\bbrokerage\b'
    sector: insurance_broker
  - regex: '\b(asset management|asset mgmt|investment management|investment managers)\b'
    sector: asset_manager
  - regex: '\bcapital partners\b|\bcapital management\b|\bcapital advisors\b'
    sector: hedge_fund
  - regex: '\bprivate equity\b'
    sector: private_equity
  - regex: '\bprivate credit\b'
    sector: private_credit
  - regex: '\bwealth management\b|\bwealth advisors\b'
    sector: wealth_manager
  - regex: '\bpension\b'
    sector: pension_fund
  - regex: '\bsovereign\b'
    sector: sovereign
  - regex: '\bcrypto\b|\bdigital assets?\b|\bblockchain\b'
    sector: crypto
  - regex: '\bpayments?\b'
    sector: payments
  - regex: '\bfintech\b'
    sector: fintech
  - regex: '\baudit\b|\baccountants?\b'
    sector: audit_firm
  - regex: '\bconsulting\b|\bconsultancy\b|\bconsultants?\b'
    sector: consultancy
  - regex: '\bregtech\b|\bcompliance\b'
    sector: regtech
  - regex: '\binsurtech\b'
    sector: insurtech
  - regex: '\bcommodities?\b|\boil\b|\bgas\b|\benergy\b|\bpower\b'
    sector: commodity_trading
  - regex: '\bbank\b'
    sector: retail_bank
  - regex: '\bsecurities\b'
    sector: investment_bank
  - regex: '\b(custodian|custody)\b'
    sector: custodian
  - regex: '\bexchange\b|\bclearing\b'
    sector: market_infrastructure
  - regex: '\bregulator\b|\b(authority|FCA|PRA)\b'
    sector: regulator
  - regex: '\b(law firm|solicitors|llp)\b'
    sector: law_firm
  - regex: '\brecruitment\b|\brecruiter\b|\bstaffing\b'
    sector: recruitment

# ─── Pattern deny-list ──────────────────────────────────────────────────
# Canonical company keys that should NEVER be auto-classified by
# patterns, even if they match. Defends against false positives.
deny_pattern_match:
  - capital_one
  - capital_group
  - bath_investment_building_society    # already in employers as building_society
  - bridge_house_friendly_society       # already in employers
  - lloyds_banking_group_perm           # already in employers (don't want "bank" pattern to override)
  - sainsbury_s_bank
  - tesco_insurance                     # already in employers
  - tesco_bank
  - m_s_bank
  - bank_of_england                     # already in employers as regulator
  - british_business_bank                # already in employers as sovereign
  - charity_bank
  - paragon_banking_group
  - paragon_bank
  - paragon_treasury
  - bank_of_london
  - alfa_systems
  - 10x_banking
